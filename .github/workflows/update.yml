name: Update formula

on:
  repository_dispatch:
    types: [update-vajax]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update vajax formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          URL="https://files.pythonhosted.org/packages/source/v/vajax/vajax-${VERSION}.tar.gz"
          # Retry download in case PyPI is still propagating
          for i in 1 2 3; do
            SHA=$(curl -sfL "$URL" | shasum -a 256 | cut -d' ' -f1)
            if [ -n "$SHA" ] && [ "$SHA" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              break
            fi
            echo "Attempt $i: waiting for PyPI propagation..."
            sleep 30
          done
          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/vajax.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/vajax.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vajax.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "vajax ${{ github.event.client_payload.version }}"
          git push
